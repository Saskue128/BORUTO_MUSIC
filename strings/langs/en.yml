play_panel_desc: |
  <b>CHOOSE THE CATEGORY FOR WHICH YOU WANNA GET HELP.</b>
  <b>ASK YOUR DOUBTS AT <a href="https://t.me/DEFAULTERS_CHAT">SUPPORT CHAT</a></b>
  
  <b>ALL COMMANDS CAN BE USED WITH : /</b>

help_admin_desc: |
  <u><b>HERE IS THE HELP FOR ADMIN MODULE:</b></u>
  
  <b>ADMIN COMMANDS:</b>
  
  JUST ADD <b>C</b> IN THE STARTING OF THE COMMANDS TO USE THEM FOR CHANNEL.
  
  /pause : PAUSE THE CURRENT PLAYING STREAM.
  /resume : RESUME THE PAUSED STREAM.
  /skip : SKIP THE CURRENT PLAYING STREAM AND START STREAMING THE NEXT TRACK IN QUEUE.
  /end OR /stop : CLEARS THE QUEUE AND END THE CURRENT PLAYING STREAM.
  /queue : SHOWS THE QUEUED TRACKS LIST.
  /loop [DISABLE/ENABLE] OR [BETWEEN 1:10] : WHEN ACTIVATED BOT WILL PLAY THE CURRENT PLAYING STREAM IN LOOP FOR 10 TIMES OR THE NUMBER OF REQUESTED LOOPS.
  /shuffle : SHUFFLE THE QUEUED TRACKS.
  /seek : SEEK THE STREAM TO THE GIVEN DURATION.
  /seekback : BACKWARD SEEK THE STREAM TO THE GIVEN DURATION.

